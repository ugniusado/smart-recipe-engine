name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  # ─── Backend unit tests ────────────────────────────────────────────
  backend-tests:
    name: Backend (.NET unit tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/SmartRecipeEngine.Tests/ --no-build --configuration Release --verbosity normal

  # ─── Frontend unit tests ───────────────────────────────────────────
  frontend-tests:
    name: Frontend (Vitest unit tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run unit tests
        run: npm test
        working-directory: client

  # ─── E2E tests ─────────────────────────────────────────────────────
  # API calls are mocked via page.route() — no backend needed
  e2e-tests:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: client

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run E2E tests
        run: npm test
        working-directory: e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
